version: "3.9"

services:
  orchestrator:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/data/orchestrator.db
    volumes:
      - orchestrator_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  orchestrator_data:
